<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexa Identity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app" class="shell hidden">
        <section class="panel">
            <header class="header">
                <div>
                    <h1>Nexa Identity</h1>
                    <p id="subtitle">Choose your character</p>
                </div>
                <button id="closeButton" class="icon-button" type="button" aria-label="Close">X</button>
            </header>

            <div id="error" class="error hidden"></div>

            <section id="charactersView" class="view hidden">
                <div id="characters" class="characters"></div>
            </section>

            <section id="createView" class="view hidden">
                <form id="createForm" class="form">
                    <label>
                        <span>First Name</span>
                        <input name="firstName" maxlength="32" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Last Name</span>
                        <input name="lastName" maxlength="32" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Birthdate</span>
                        <input name="birthdate" placeholder="YYYY-MM-DD" pattern="\d{4}-\d{2}-\d{2}" required>
                    </label>
                    <label>
                        <span>Gender</span>
                        <select name="gender">
                            <option value="unknown">Unknown</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="diverse">Diverse</option>
                        </select>
                    </label>
                    <label>
                        <span>Height (cm)</span>
                        <input
                            name="height"
                            type="number"
                            min="120"
                            max="230"
                            value="180"
                            required
                        >
                    </label>
                    <label>
                        <span>Weight (kg)</span>
                        <input
                            name="weight"
                            type="number"
                            min="35"
                            max="220"
                            value="80"
                            required
                        >
                    </label>
                    <button id="createButton" class="primary" type="submit">Create Character</button>
                </form>
            </section>

            <div id="loading" class="loading hidden">Loading...</div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
