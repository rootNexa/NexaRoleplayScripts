<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexa Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app" class="nexa-admin" hidden>
        <aside class="nexa-admin__sidebar">
            <div>
                <p class="nexa-admin__kicker">Nexa</p>
                <h1>Admin</h1>
            </div>
            <nav id="sectionNav" class="nexa-admin__nav" aria-label="Admin sections"></nav>
        </aside>
        <section class="nexa-admin__content">
            <header class="nexa-admin__header">
                <div>
                    <p class="nexa-admin__kicker">Operations</p>
                    <h2 id="sectionTitle">Overview</h2>
                </div>
                <div class="nexa-admin__actions">
                    <button id="refreshButton" type="button">Refresh</button>
                    <button id="closeButton" type="button">Close</button>
                </div>
            </header>
            <section id="dashboard" class="nexa-admin__grid"></section>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
